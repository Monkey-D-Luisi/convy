services:
  db:
    image: postgres:16-alpine
    container_name: convy-db
    restart: unless-stopped
    env_file:
      - ${CONVY_DOCKER_ENV_FILE:-.env.example}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-convy}
      POSTGRES_USER: ${POSTGRES_USER:-convy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-convy_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - convy-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-convy} -d ${POSTGRES_DB:-convy}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: convy-api
    restart: unless-stopped
    env_file:
      - ${CONVY_DOCKER_ENV_FILE:-.env.example}
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${POSTGRES_DB:-convy};Username=${POSTGRES_USER:-convy};Password=${POSTGRES_PASSWORD:-convy_dev_password}"
    ports:
      - "${API_PORT:-5000}:8080"
    depends_on:
      db:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: convy-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@convy.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - tools

volumes:
  convy-pgdata:
