name: convy

x-convy-env-file: &convy-env-file
  - path: ${CONVY_ENV_FILE:-/opt/convy/shared/api.env}
    required: false
  - path: ${CONVY_RELEASE_ENV_FILE:-/opt/convy/shared/release.env}
    required: false

services:
  db:
    image: postgres:16-alpine
    container_name: convy-db
    restart: unless-stopped
    env_file: *convy-env-file
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /opt/convy/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - convy

  api:
    build:
      context: ../backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: convy-api
    restart: unless-stopped
    env_file: *convy-env-file
    environment:
      ASPNETCORE_ENVIRONMENT: Staging
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Firebase__ProjectId: ${FIREBASE_PROJECT_ID}
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/firebase-admin.json
      OpenAI__ApiKey: ${OPENAI_API_KEY}
      Features__VoiceParsingEnabled: ${VOICE_PARSING_ENABLED:-true}
      Database__MigrateOnStartup: ${DATABASE_MIGRATE_ON_STARTUP:-true}
      McpAuth__Issuer: https://${CONVY_AUTH_HOSTNAME}
      McpAuth__Audience: https://${CONVY_MCP_HOSTNAME}
      McpAuth__AuthorizationEndpoint: https://${CONVY_AUTH_HOSTNAME}/oauth/authorize
      McpAuth__PrivateKeyPemBase64: ${McpAuth__PrivateKeyPemBase64}
      McpAuth__PublicKeyPemBase64: ${McpAuth__PublicKeyPemBase64}
      McpAuth__AllowedClientMetadataHosts__0: chat.openai.com
      McpAuth__AllowedClientMetadataHosts__1: chatgpt.com
      McpAudit__ApiKey: ${McpAudit__ApiKey}
    volumes:
      - /opt/convy/shared/firebase-admin.json:/run/secrets/firebase-admin.json:ro
      - /opt/convy/backups/postgres:/opt/convy/backups/postgres:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - convy

  worker:
    build:
      context: ../backend
      dockerfile: ../docker/worker/Dockerfile
    container_name: convy-worker
    restart: unless-stopped
    env_file: *convy-env-file
    environment:
      DOTNET_ENVIRONMENT: Staging
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Firebase__ProjectId: ${FIREBASE_PROJECT_ID}
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/firebase-admin.json
      Operations__DataPath: /opt/convy
    volumes:
      - /opt/convy/shared/firebase-admin.json:/run/secrets/firebase-admin.json:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - convy

  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    container_name: convy-dashboard
    restart: unless-stopped
    env_file: *convy-env-file
    environment:
      NODE_ENV: production
      CONVY_API_BASE_URL: http://api:8080
      NEXT_PUBLIC_FIREBASE_API_KEY: ${FIREBASE_WEB_API_KEY}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${FIREBASE_AUTH_DOMAIN}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${FIREBASE_WEB_APP_ID}
    depends_on:
      - api
    networks:
      - convy

  auth:
    build:
      context: ../auth
      dockerfile: Dockerfile
    container_name: convy-auth
    restart: unless-stopped
    env_file: *convy-env-file
    environment:
      NODE_ENV: production
      CONVY_API_BASE_URL: http://api:8080
      NEXT_PUBLIC_FIREBASE_API_KEY: ${FIREBASE_WEB_API_KEY}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${FIREBASE_AUTH_DOMAIN}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${FIREBASE_WEB_APP_ID}
    depends_on:
      - api
    networks:
      - convy

  mcp:
    build:
      context: ../mcp
      dockerfile: Dockerfile
    container_name: convy-mcp
    restart: unless-stopped
    env_file: *convy-env-file
    environment:
      NODE_ENV: production
      PORT: 3001
      CONVY_API_BASE_URL: http://api:8080
      MCP_PUBLIC_URL: https://${CONVY_MCP_HOSTNAME}
      AUTH_PUBLIC_URL: https://${CONVY_AUTH_HOSTNAME}
      MCP_JWT_ISSUER: https://${CONVY_AUTH_HOSTNAME}
      MCP_JWT_AUDIENCE: https://${CONVY_MCP_HOSTNAME}
      MCP_JWT_PUBLIC_KEY_BASE64: ${McpAuth__PublicKeyPemBase64}
      CONVY_MCP_AUDIT_API_KEY: ${McpAudit__ApiKey}
      OPENAI_APPS_CHALLENGE_TOKEN: ${OPENAI_APPS_CHALLENGE_TOKEN:-}
    depends_on:
      - api
    networks:
      - convy

  caddy:
    image: caddy:2.10.0-alpine
    container_name: convy-caddy
    restart: unless-stopped
    env_file: *convy-env-file
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.vps:/etc/caddy/Caddyfile:ro
      - /opt/convy/public:/srv/public:ro
      - /opt/convy/legal:/srv/legal:ro
      - /opt/convy/caddy/data:/data
      - /opt/convy/caddy/config:/config
    depends_on:
      - api
      - dashboard
      - auth
      - mcp
    networks:
      - convy

networks:
  convy:
    name: convy
