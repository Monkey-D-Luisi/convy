<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Convy</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #18231f;
        --muted: #5d6b65;
        --line: #d9e1dd;
        --brand: #0b7a5f;
        --surface: #f5f8f6;
      }

      body {
        margin: 0;
        background: var(--surface);
        color: var(--ink);
        font-family: Arial, sans-serif;
      }

      main {
        margin: 0 auto;
        max-width: 760px;
        padding: 80px 24px;
      }

      h1 {
        margin: 0;
        font-size: 42px;
        line-height: 1.1;
      }

      p {
        color: var(--muted);
        font-size: 18px;
        line-height: 1.6;
      }

      nav {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 32px;
      }

      a {
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--brand);
        display: inline-block;
        font-weight: 700;
        padding: 12px 14px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Convy</h1>
      <p>Convy helps households manage shared shopping lists, tasks, voice capture, and activity. The private beta ChatGPT MCP integration can read authorized household data and perform limited confirmed item/task writes.</p>
      <nav aria-label="Convy links">
        <a href="https://legal.convyapp.com/privacy">Privacy</a>
        <a href="https://legal.convyapp.com/terms">Terms</a>
        <a href="https://mcp.convyapp.com/docs">MCP docs</a>
      </nav>
    </main>
  </body>
</html>
