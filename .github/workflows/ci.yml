name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: convy_test
          POSTGRES_USER: convy
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U convy -d convy_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore backend/Convy.slnx

      - name: Build
        run: dotnet build backend/Convy.slnx --no-restore -c Release

      - name: Test
        run: dotnet test backend/Convy.slnx --no-build -c Release --verbosity normal
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=convy_test;Username=convy;Password=test_password"

  dashboard:
    name: Dashboard Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install
        working-directory: dashboard
        run: npm ci

      - name: Test
        working-directory: dashboard
        run: npm test

      - name: Lint
        working-directory: dashboard
        run: npm run lint

      - name: Build
        working-directory: dashboard
        run: npm run build

  auth:
    name: Auth App Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: auth/package-lock.json

      - name: Install
        working-directory: auth
        run: npm ci

      - name: Test
        working-directory: auth
        run: npm test

      - name: Lint
        working-directory: auth
        run: npm run lint

      - name: Build
        working-directory: auth
        run: npm run build

  mcp:
    name: MCP Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: mcp/package-lock.json

      - name: Install
        working-directory: mcp
        run: npm ci

      - name: Test
        working-directory: mcp
        run: npm test

      - name: Lint
        working-directory: mcp
        run: npm run lint

      - name: Build
        working-directory: mcp
        run: npm run build

  mobile:
    name: Mobile Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x mobile/gradlew

      - name: Unit tests
        working-directory: mobile
        run: ./gradlew :shared:testDebugUnitTest :composeApp:testDebugUnitTest --console=plain

      - name: Assemble local debug
        working-directory: mobile
        run: ./gradlew :androidApp:assembleLocalDebug --console=plain

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp,javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3

  infra:
    name: Infrastructure Config
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate compose files
        run: |
          docker compose -f docker/docker-compose.yml config --quiet
          docker compose -f docker/docker-compose.vps.yml config --quiet
          docker compose -f docker/docker-compose.oci.yml config --quiet

      - name: Validate deploy scripts
        shell: pwsh
        run: |
          Get-ChildItem ops -Recurse -Filter *.sh | ForEach-Object { bash -n $_.FullName }
          Get-ChildItem ops -Recurse -Filter *.ps1 | ForEach-Object {
            $errors = $null
            [System.Management.Automation.PSParser]::Tokenize((Get-Content -Raw $_.FullName), [ref]$errors) | Out-Null
            if ($errors) {
              $errors | ForEach-Object { Write-Error "$($_.Message) in $($_.Token.Content)" }
              exit 1
            }
          }

      - name: Validate Docker builds
        run: |
          docker build -f docker/backend/Dockerfile backend
          docker build -f docker/worker/Dockerfile backend
          docker build -f dashboard/Dockerfile dashboard
          docker build -f auth/Dockerfile auth
          docker build -f mcp/Dockerfile mcp
