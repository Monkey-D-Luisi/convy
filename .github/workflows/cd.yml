name: CD

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main, master]
    types: [completed]

env:
  DEPLOY_USER: ubuntu

jobs:
  deploy-production:
    name: Deploy to OCI
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production

    steps:
      - name: Checkout CI commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.OCI_SSH_PRIVATE_KEY }}" > ~/.ssh/convy_oci_deploy
          chmod 600 ~/.ssh/convy_oci_deploy
          ssh-keyscan -H "${{ secrets.OCI_DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Package release
        run: |
          tar \
            --exclude='.git' \
            --exclude='backend/**/bin' \
            --exclude='backend/**/obj' \
            --exclude='mobile/**/build' \
            --exclude='mobile/.gradle' \
            --exclude='infra/.terraform' \
            -czf /tmp/convy-release.tar.gz .

      - name: Upload release
        run: |
          ssh -i ~/.ssh/convy_oci_deploy "${DEPLOY_USER}@${{ secrets.OCI_DEPLOY_HOST }}" \
            "sudo mkdir -p /opt/convy/releases/${{ github.event.workflow_run.head_sha }}"
          scp -i ~/.ssh/convy_oci_deploy /tmp/convy-release.tar.gz \
            "${DEPLOY_USER}@${{ secrets.OCI_DEPLOY_HOST }}:/tmp/convy-release.tar.gz"

      - name: Activate release
        run: |
          ssh -i ~/.ssh/convy_oci_deploy "${DEPLOY_USER}@${{ secrets.OCI_DEPLOY_HOST }}" \
            "sudo tar -xzf /tmp/convy-release.tar.gz -C /opt/convy/releases/${{ github.event.workflow_run.head_sha }} && sudo /opt/convy/releases/${{ github.event.workflow_run.head_sha }}/ops/oci/deploy-release.sh ${{ github.event.workflow_run.head_sha }}"

      - name: External health check
        run: curl -fsS --retry 10 --retry-delay 5 "https://${{ secrets.OCI_PUBLIC_HOSTNAME }}/health"
