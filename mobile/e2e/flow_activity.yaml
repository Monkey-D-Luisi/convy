appId: com.monkeydluisi.convy
---
# Flow: View activity feed with date grouping
# Precondition: user is on HouseholdLists screen, some activity exists
- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      text: "Test Home"
    timeout: 15000

# Tap Activity icon in top bar
- tapOn: "Activity"

# Activity screen should appear
- assertVisible:
    text: "Activity"

# Date grouping should show "Today" header since all activity is recent
- assertVisible:
    text: "Today"

# After our test actions, there should be "Created" entries (items, lists, etc.)
- assertVisible:
    text: "Created.*"

# Go back
- tapOn: "Back"
