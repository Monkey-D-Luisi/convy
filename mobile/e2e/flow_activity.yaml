appId: com.monkeydluisi.convy
---
# Flow: View activity feed
# Precondition: user is on HouseholdLists screen, some activity exists
- launchApp
- assertVisible:
    text: ".*"
    timeout: 10000

# Tap Activity icon in top bar
- tapOn:
    id: "Activity"

# Activity screen should appear
- assertVisible:
    text: "Activity"
    timeout: 5000

# If activity exists, should see at least one entry
# If empty, should see empty state
- assertVisible:
    text: "Created|Updated|Completed|Deleted|Archived|Renamed|Joined|No activity yet"
    timeout: 5000

# Go back
- tapOn:
    id: "Back"
