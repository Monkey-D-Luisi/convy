appId: com.monkeydluisi.convy
---
# Flow: Add an item with all fields
# Precondition: user has a list open
- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      text: "Test Home"
    timeout: 15000

# Open a list (tap on it)
- tapOn:
    text: "Weekly Groceries"

# Wait for list detail to fully load (back arrow indicates detail screen)
- extendedWaitUntil:
    visible:
      text: "Add item"
    timeout: 10000

# Tap FAB to add item
- tapOn: "Add item"

# Item form should show
- assertVisible: "New item"

# Fill title
- tapOn: "Title *"
- inputText: "Milk"

# Fill quantity
- tapOn: "Qty"
- inputText: "2"

# Fill unit
- tapOn: "Unit"
- inputText: "liters"

# Fill note
- tapOn: "Note"
- inputText: "Semi-skimmed"

# Dismiss keyboard by tapping on the form title bar area, then scroll to save button
- tapOn:
    point: "50%,5%"

- scrollUntilVisible:
    element:
      text: "Add item"
    direction: DOWN
    timeout: 5000

# Save
- tapOn: "Add item"

# Should return to list with item visible
- assertVisible:
    text: "Milk"

- assertVisible:
    text: "2 liters.*"
