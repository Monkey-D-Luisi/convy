appId: com.monkeydluisi.convy
---
# Flow: Settings and sign out
# Precondition: user is on HouseholdLists screen
- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      text: "Test Home"
    timeout: 15000

# Tap Settings icon
- tapOn: "Settings"

# Settings screen
- assertVisible:
    text: "Settings"

- assertVisible: "App version"
- assertVisible: "0.1.0"
- assertVisible: "Sign out"

# Sign out
- tapOn: "Sign out"

# Should return to auth screen
- assertVisible:
    text: "Convy"

- assertVisible: "Sign in"
