appId: com.monkeydluisi.convy
---
# Flow: Settings — verify elements and sign out
# Precondition: user is on HouseholdLists screen
- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      text: "Test Home"
    timeout: 15000

# Tap Settings icon
- tapOn: "Settings"

# Settings screen
- assertVisible:
    text: "Settings"

# Verify household section with rename button
- assertVisible: "Household"

- assertVisible: "App version"
- assertVisible: "${APP_VERSION}"

# Verify notification settings section
- assertVisible: "Notifications"
- assertVisible: "Shopping items added"
- assertVisible: "Tasks added"
- scrollUntilVisible:
    element:
      text: "Member changes"
    direction: DOWN
    timeout: 5000

# Verify account actions after the scrollable notification section
- scrollUntilVisible:
    element:
      text: "Leave household"
    direction: DOWN
    timeout: 5000
- assertVisible: "Leave household"
- assertVisible: "Sign out"

# Sign out
- tapOn: "Sign out"

# Should return to auth screen
- assertVisible:
    text: "Convy"

- assertVisible: "Sign in"
