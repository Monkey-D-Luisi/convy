appId: com.monkeydluisi.convy
---
# Flow: Join household using invite code (second user perspective)
# Precondition: flow_invite has generated an invite code, user has been signed out by flow_settings
# NOTE: This flow depends on a known invite code. Since Maestro can't easily pass
# data between flows, this tests the JOIN UI path with a fresh registration.
# The invite code from a previous flow may have expired or be unavailable,
# so we test the UI flow up to the point of code entry.
- launchApp:
    clearState: false

# We should be on auth screen after sign-out from flow_settings
- assertVisible: "Convy"

# Register a new user
- tapOn:
    text: "Don't have an account? Create one"
    optional: true

# Fill sign-up form with a different user
- tapOn: "Display name"
- inputText: "Second User"
- tapOn: "Email"
- inputText: "second_${EMAIL}"
- tapOn: "Password"
- inputText: "Test1234!"

# Dismiss keyboard
- tapOn:
    point: "50%,5%"

# Submit registration
- tapOn: "Create account"

# Should navigate to household setup
- extendedWaitUntil:
    visible:
      text: "Set up your home"
    timeout: 30000

# Switch to Join mode
- tapOn: "Want to join an existing household?"

# Verify join mode UI
- assertVisible: "Enter an invite code to join an existing household"
- assertVisible: "Invite code"

# Enter a test invite code (this will likely fail to join since we don't have a real code,
# but it validates the entire join UI flow)
- tapOn: "Invite code"
- inputText: "TESTCODE"

# Dismiss keyboard
- tapOn:
    point: "50%,5%"

# Tap join button — this will attempt to call the API
- tapOn: "Join household"

# The join will likely fail with an error (invalid code), which is expected.
# We verify the UI handles the error gracefully.
# Wait a moment for the API response
- extendedWaitUntil:
    visible:
      text: ".*"
    timeout: 5000
    optional: true

# Switch back to Create mode to leave the app in a usable state for flow_sign_in
- tapOn:
    text: "Want to create a new household?"
    optional: true

# Create a household so this user has a home
- tapOn:
    text: "Household name"
    optional: true
- inputText: "Second Home"

- tapOn:
    text: "Create household"
    optional: true

# Sign out so flow_sign_in can use the original user
- extendedWaitUntil:
    visible:
      text: "Second Home"
    timeout: 15000
    optional: true

- tapOn:
    text: "Settings"
    optional: true

- tapOn:
    text: "Sign out"
    optional: true

# Should return to auth screen
- extendedWaitUntil:
    visible:
      text: "Convy"
    timeout: 10000
