appId: com.monkeydluisi.convy
---
# Flow: Join household using a real invite code (second user perspective)
# Precondition: flow_settings signed out the original user.
- launchApp:
    clearState: false

# Sign in as the original user to generate a fresh invite within this flow.
- assertVisible: "Convy"
- tapOn:
    text: ".*account.*Sign in"
    optional: true

- tapOn: "Email"
- inputText: "${EMAIL}"
- tapOn: "Password"
- inputText: "Test1234!"

- tapOn:
    point: "50%,5%"

- tapOn: "Sign in"

- extendedWaitUntil:
    visible:
      text: "Test Home"
    timeout: 30000

- tapOn: "Members"
- assertVisible: "Members"
- tapOn: "Generate invite code"

- extendedWaitUntil:
    visible:
      id: "generated-invite-code"
    timeout: 10000

- copyTextFrom:
    id: "generated-invite-code"

- tapOn: "Back"

# Sign out original user so the second user can register and join.
- tapOn: "Settings"
- assertVisible: "Settings"
- scrollUntilVisible:
    element:
      text: "Sign out"
    direction: DOWN
    timeout: 5000
- tapOn: "Sign out"

- extendedWaitUntil:
    visible:
      text: "Convy"
    timeout: 10000

# Register a new second user.
- tapOn:
    text: ".*Create one"
    optional: true

- tapOn: "Display name"
- inputText: "Second User"
- tapOn: "Email"
- inputText: "${JOIN_EMAIL}"
- tapOn: "Password"
- inputText: "Test1234!"

- tapOn:
    point: "50%,5%"

- tapOn: "Create account"

- extendedWaitUntil:
    visible:
      text: "Set up your home"
    timeout: 30000

- tapOn: "Have an invite code? Join instead"

- assertVisible: "Enter an invite code to join an existing household"
- assertVisible: "Invite code"

# Use the real invite code copied earlier in this same flow.
- tapOn: "Invite code"
- inputText: "${maestro.copiedText}"

- tapOn:
    point: "50%,5%"

- tapOn: "Join household"

- extendedWaitUntil:
    visible:
      text: "Test Home"
    timeout: 30000

# Leave the app signed out for flow_sign_in.
- tapOn: "Settings"
- assertVisible: "Settings"
- scrollUntilVisible:
    element:
      text: "Sign out"
    direction: DOWN
    timeout: 5000
- tapOn: "Sign out"

- extendedWaitUntil:
    visible:
      text: "Convy"
    timeout: 10000
