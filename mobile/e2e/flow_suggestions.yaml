appId: com.monkeydluisi.convy
---
# Flow: Verify item suggestions appear while typing
# Precondition: user has previously added items (e.g., "Milk")
- launchApp
- assertVisible:
    text: ".*"
    timeout: 10000

# Navigate to list
- tapOn:
    text: "Weekly Groceries"
    optional: true

# Open add item form
- tapOn:
    id: "Add item"
- assertVisible: "New item"

# Type partial text that matches a frequent item
- tapOn: "Title *"
- inputText: "Mil"

# Suggestions should appear as chips
- assertVisible:
    text: "Milk"
    timeout: 5000

# Tap suggestion to autofill
- tapOn: "Milk"

# Title should be filled
- assertVisible: "Milk"

# Go back without saving
- tapOn:
    id: "Back"
