appId: com.monkeydluisi.convy
---
# Flow: Android hardware Back returns to the previous in-app screen.
- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      text: "Test Home"
    timeout: 15000
- tapOn: "Weekly Groceries"
- extendedWaitUntil:
    visible:
      text: "Add item"
    timeout: 10000
- pressKey: Back
- extendedWaitUntil:
    visible:
      text: "Test Home"
    timeout: 5000
