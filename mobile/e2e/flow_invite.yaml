appId: com.monkeydluisi.convy
---
# Flow: Generate invite and join from another perspective
# Precondition: user is on HouseholdLists screen
- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      text: "Test Home"
    timeout: 15000

# Go to Members screen
- tapOn: "Members"

# Should see Members screen
- assertVisible:
    text: "Members"

# Should see invite section
- assertVisible: "Invite someone"

# Generate invite code
- tapOn: "Generate invite code"

# Invite code should be visible
- assertVisible:
    text: "Invite code:"

# Copy the generated code to verify the visible copy action.
- tapOn: "Copy code"

# Active invites should also be directly copyable.
- extendedWaitUntil:
    visible:
      id: "copy-active-invite-code"
    timeout: 10000

# Go back
- tapOn: "Back"
