appId: com.monkeydluisi.convy
---
# Flow: Complete an item by tapping its checkbox
# Precondition: user has "Whole Milk" in "Weekly Groceries"
- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      text: "Test Home"
    timeout: 15000

# Navigate to list detail
- tapOn: "Weekly Groceries"

# Wait for list detail and the item
- extendedWaitUntil:
    visible:
      text: "Whole Milk"
    timeout: 10000

# Tap the first item's checkbox using testTag
- tapOn:
    id: "item-checkbox"

# After completing the only item, "Completed" section should appear
- extendedWaitUntil:
    visible:
      text: "Completed.*"
    timeout: 10000

# Navigate back to household list for next flow
- tapOn: "Back"
