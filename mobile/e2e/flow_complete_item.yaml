appId: com.monkeydluisi.convy
---
# Flow: Complete an item by tapping its checkbox
# Precondition: user has "Whole Milk" in "Weekly Groceries"
- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      text: "Test Home"
    timeout: 15000

# Navigate to list detail
- tapOn: "Weekly Groceries"

# Wait for list detail and the item
- extendedWaitUntil:
    visible:
      text: "Whole Milk"
    timeout: 10000

# The item card has checkbox at left, text at right.
# Tapping text navigates to edit. We need the checkbox.
# The checkbox is at the very left edge of the card.
# Using a very specific strategy: tap the checkbox area only.
# On a standard phone: checkbox center is about 5% from left, 18% from top.
- tapOn:
    point: "5%,18%"

# After completing the only item, "Completed" section should appear
- extendedWaitUntil:
    visible:
      text: "Completed.*"
    timeout: 10000

# Navigate back to household list for next flow
- tapOn: "Back"
