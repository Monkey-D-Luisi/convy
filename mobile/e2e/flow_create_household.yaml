appId: com.monkeydluisi.convy
---
# Flow: Create a new household
# Precondition: user is authenticated and on HouseholdSetup screen (from flow_register)
- launchApp:
    clearState: false

# Should still be on household setup from registration
- extendedWaitUntil:
    visible:
      text: "Set up your home"
    timeout: 15000

# Should be in create mode by default
- assertVisible: "Create a new household to get started"

# Enter household name
- tapOn: "Household name"
- inputText: "Test Home"

# Create
- tapOn: "Create household"

# Should navigate to lists screen
- assertVisible:
    text: "Test Home"

# Verify empty state
- assertVisible: "No lists yet. Tap + to create one!"
