appId: com.monkeydluisi.convy
---
# Flow: Rename an existing list
# Precondition: user is on HouseholdLists screen with "House Chores" and "Weekly Groceries"
- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      text: "Test Home"
    timeout: 15000

# Tap three-dot menu on "Weekly Groceries" list card (index 1 = second Options button)
- tapOn:
    text: "Options"
    index: 1

# Tap Rename in dropdown menu
- tapOn: "Rename"

# Rename dialog should appear
- assertVisible: "Rename list"

# Text is auto-selected, just type new name (replaces selection)
- inputText: "Supermarket Run"

# Confirm rename
- tapOn: "Rename"

# Should update on lists screen
- extendedWaitUntil:
    visible:
      text: "Supermarket Run"
    timeout: 5000

# Rename back to original for subsequent tests
- tapOn:
    text: "Options"
    index: 1
- tapOn: "Rename"

# Text is auto-selected, just type new name
- inputText: "Weekly Groceries"
- tapOn: "Rename"

# Verify restored name
- extendedWaitUntil:
    visible:
      text: "Weekly Groceries"
    timeout: 5000
