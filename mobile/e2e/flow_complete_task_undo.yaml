appId: com.monkeydluisi.convy
---
# Flow: Completing a task shows undo and restores correctly.
- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      text: "Test Home"
    timeout: 15000
- tapOn: "House Chores"
- extendedWaitUntil:
    visible:
      text: "Vacuum hallway"
    timeout: 10000
- tapOn:
    id: "item-checkbox"
- extendedWaitUntil:
    visible:
      text: "Task completed"
    timeout: 5000
- tapOn: "Undo"
- extendedWaitUntil:
    visible:
      text: "Vacuum hallway"
    timeout: 5000
- tapOn: "Back"
