appId: com.monkeydluisi.convy
---
# Flow: Sign in with existing account
- launchApp:
    clearState: false

# Auth screen
- assertVisible: "Convy"

# Ensure we're on sign-in mode
- tapOn:
    text: ".*account.*Sign in"
    optional: true

# Fill sign-in form using the email env var (same as registration)
- tapOn: "Email"
- inputText: "${EMAIL}"
- tapOn: "Password"
- inputText: "Test1234!"

# Dismiss keyboard by tapping header area
- tapOn:
    point: "50%,5%"

# Submit
- tapOn: "Sign in"

# Should navigate to household lists
- extendedWaitUntil:
    visible:
      text: "Test Home"
    timeout: 30000
