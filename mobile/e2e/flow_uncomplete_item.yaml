appId: com.monkeydluisi.convy
---
# Flow: Uncomplete (undo) a completed item
# Precondition: user has completed items in "Weekly Groceries"
- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      text: "Test Home"
    timeout: 15000

# Navigate to list detail
- tapOn: "Weekly Groceries"

# Wait for list detail
- extendedWaitUntil:
    visible:
      text: "Add item"
    timeout: 10000

# Switch to Completed filter to find completed items
- tapOn:
    text: "Completed"
    index: 0

# Wait for completed section to load (collapsed by default, "Show" button visible)
- extendedWaitUntil:
    visible:
      text: "Show"
    timeout: 10000

# Expand the completed section by tapping the "Show" button
- tapOn: "Show"

# Wait for a completed item's checkbox to become visible
- extendedWaitUntil:
    visible:
      id: "item-checkbox"
    timeout: 10000

# Tap checkbox of a completed item to uncomplete it
- tapOn:
    id: "item-checkbox"

# Switch back to All filter to verify item moved back to Pending
- tapOn: "All"

# Navigate back for next flow
- tapOn: "Back"
