appId: com.monkeydluisi.convy
---
# Flow: Edit an existing item
# Precondition: user has a list open with at least one item
- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      text: "Test Home"
    timeout: 15000

# Navigate to list if needed
- tapOn: "Weekly Groceries"

# Wait for list detail
- assertVisible: "Back"

# Tap item card to edit (onClick navigates to edit)
- tapOn: "Milk"

# Edit form should appear
- assertVisible:
    text: "Edit item"

# Clear and update title
# Long-press on the title value to select text, then erase and type new value
- longPressOn: "Milk"
- eraseText: 20
- inputText: "Whole Milk"

# Update quantity
# Long-press on "2" to select it, then erase and type
- longPressOn: "2"
- eraseText: 10
- inputText: "3"

# Dismiss keyboard and find save button
- tapOn:
    point: "50%,5%"
- scrollUntilVisible:
    element:
      text: "Save changes"
    direction: DOWN
    timeout: 5000

# Save
- tapOn: "Save changes"

# Updated item should be visible
- assertVisible:
    text: "Whole Milk"
