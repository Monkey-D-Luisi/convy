appId: com.monkeydluisi.convy
---
# Flow: Delete an item from a list
# Precondition: user has a list open with at least one item
- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      text: "Test Home"
    timeout: 15000

# Navigate to list if needed
- tapOn: "Weekly Groceries"

# Wait for list detail
- assertVisible: "Back"

# The item was completed in the previous flow, so it's in the collapsed "Completed" section.
# Expand it by tapping the "Show" arrow button.
- tapOn: "Show"

# Now the completed item should be visible
- extendedWaitUntil:
    visible:
      text: "Whole Milk"
    timeout: 5000

# Tap item card to open edit form
- tapOn: "Whole Milk"

# Should see edit form
- assertVisible:
    text: "Edit item"

# Tap delete icon in top bar
- tapOn: "Delete"

# Item should be removed, back to list
- assertNotVisible:
    text: "Whole Milk"
