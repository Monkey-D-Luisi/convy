appId: com.monkeydluisi.convy
---
# Flow: Delete an item from a list
# Precondition: user has a list with items (after complete/uncomplete flows)
- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      text: "Test Home"
    timeout: 15000

# Navigate to list
- tapOn: "Weekly Groceries"

# Wait for list detail
- extendedWaitUntil:
    visible:
      text: "Whole Milk"
    timeout: 5000

# Tap item card to open edit form
- tapOn: "Whole Milk"

# Should see edit form
- assertVisible:
    text: "Edit item"

# Tap delete icon in top bar
- tapOn: "Delete"

# Item should be removed, back to list
- assertNotVisible:
    text: "Whole Milk"
