appId: com.monkeydluisi.convy
---
# Flow: Register a new user account
- stopApp
- clearState
- launchApp

# Auth screen should be visible
- assertVisible: "Convy"
- assertVisible: "Coordinate your home effortlessly"

# Switch to sign-up mode if needed
- tapOn:
    text: ".*Create one"
    optional: true

# Fill sign-up form
- tapOn: "Display name"
- inputText: "Test User"
- tapOn: "Email"
- inputText: "${EMAIL}"
- tapOn: "Password"
- inputText: "Test1234!"

# Dismiss keyboard by tapping header area
- tapOn:
    point: "50%,5%"

# Submit
- tapOn: "Create account"

# Should navigate to household setup
- extendedWaitUntil:
    visible:
      text: "Set up your home"
    timeout: 30000
