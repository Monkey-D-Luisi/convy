appId: com.monkeydluisi.convy
---
# Flow: Add a duplicate item and verify warning
# Precondition: user has a list open with "Milk" already added
- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      text: "Test Home"
    timeout: 15000

# Navigate to list
- tapOn: "Weekly Groceries"

# Wait for list detail
- assertVisible: "Back"

# Add first item if not already present
- tapOn: "Add item"
- assertVisible: "New item"
- tapOn: "Title *"
- inputText: "Milk"

# Dismiss keyboard and scroll to save button
- tapOn:
    point: "50%,5%"
- scrollUntilVisible:
    element:
      text: "Add item"
    direction: DOWN
    timeout: 5000
- tapOn: "Add item"

# Wait for list
- assertVisible:
    text: "Milk"

# Now add duplicate
- tapOn: "Add item"
- assertVisible: "New item"
- tapOn: "Title *"
- inputText: "Milk"

# Duplicate warning should appear
- assertVisible:
    text: "Possible duplicates found:"

# User can dismiss and still add
- tapOn: "Dismiss"

# Dismiss keyboard and scroll to save button
- tapOn:
    point: "50%,5%"
- scrollUntilVisible:
    element:
      text: "Add item"
    direction: DOWN
    timeout: 5000

# Add the item anyway
- tapOn: "Add item"

# Should be back on list
- assertVisible:
    text: "Milk"
