appId: com.monkeydluisi.convy
---
# Flow: Add a duplicate item and verify warning
# Precondition: user has a list open with "Milk" already added
- launchApp
- assertVisible:
    text: ".*"
    timeout: 10000

# Navigate to list
- tapOn:
    text: "Weekly Groceries"
    optional: true

# Add first item if not already present
- tapOn:
    id: "Add item"
- assertVisible: "New item"
- tapOn: "Title *"
- inputText: "Milk"
- tapOn: "Add item"

# Wait for list
- assertVisible:
    text: "Milk"
    timeout: 5000

# Now add duplicate
- tapOn:
    id: "Add item"
- assertVisible: "New item"
- tapOn: "Title *"
- inputText: "Milk"

# Duplicate warning should appear
- assertVisible:
    text: "Possible duplicates found:"
    timeout: 5000

# User can dismiss and still add
- tapOn: "Dismiss"

# Add the item anyway
- tapOn: "Add item"

# Should be back on list
- assertVisible:
    text: "Milk"
    timeout: 5000
