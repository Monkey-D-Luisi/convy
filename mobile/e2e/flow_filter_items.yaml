appId: com.monkeydluisi.convy
---
# Flow: Filter items using filter chips
# Precondition: user is signed in, list has items (all pending)
- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      text: "Test Home"
    timeout: 15000

# Navigate to list
- tapOn: "Weekly Groceries"

# Wait for list detail and items to load
- extendedWaitUntil:
    visible:
      id: "item-checkbox"
    timeout: 10000

# Switch to Pending filter first to ensure we only tap a pending item's checkbox
- tapOn:
    text: "Pending"
    index: 0

# Wait for pending items to render
- extendedWaitUntil:
    visible:
      id: "item-checkbox"
    timeout: 10000

# Complete the first pending item by tapping its checkbox
- tapOn:
    id: "item-checkbox"

# Switch to All filter to see both pending and completed sections
- tapOn:
    text: "All"

# Wait for completed section to appear ("Show" button = collapsed completed section)
- extendedWaitUntil:
    visible:
      text: "Show"
    timeout: 10000

# Filter chips should be visible
- assertVisible: "All"
- assertVisible: "Pending"
- assertVisible: "Completed"

# Tap "Pending" filter
- tapOn:
    text: "Pending"
    index: 0

# Should show only pending items, no completed section
- assertNotVisible: "Show"

# Tap "Completed" filter to see only completed items
- tapOn:
    text: "Completed"
    index: 0

# Should show the completed section exists
- assertVisible: "Show"

# Tap "All" to reset
- tapOn:
    text: "All"

# Go back
- tapOn: "Back"
